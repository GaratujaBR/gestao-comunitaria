<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background:#4CAF50; font-family: var(--cc-font-sans); color:#F3EFE0; }
  body { padding: 24px; display:flex; align-items:center; justify-content:center; min-height:100vh; box-sizing:border-box; }
  .wrap { width:100%; max-width:660px; display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center; }
  .logo { width: 160px; height:160px; object-fit: contain; filter: drop-shadow(0 6px 18px rgba(45,90,39,.25)); }
  .name { font-size: 32px; font-weight: 800; letter-spacing: 0.04em; color:#F3EFE0; }
  .tag { font-size: 13px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color:#D5E8D4; }
  .divider { width: 48px; height: 2px; background:#88C9A1; border-radius:9999px; margin: 4px 0; }
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="../assets/logo-flor.png" alt="Logo Terra de Canaã">
  <div class="tag">Vilarejo Ecológico</div>
  <div class="name">Terra de Canaã</div>
  <div class="divider"></div>
  <div style="font-size:14px;color:#D5E8D4">Intentional Community · Serra do Cipó</div>
</div>
</body>
</html>
