<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background:#F8F7F4; font-family: var(--cc-font-sans); }
  body { padding: 20px; display:flex; align-items:center; justify-content:center; min-height: 100vh; box-sizing:border-box; }
  .wrap { width: 100%; max-width: 660px; display:flex; flex-direction:column; gap: 6px; }
  .stop { display:flex; align-items:center; gap: 14px; }
  .bar { flex:1; height: 44px; border-radius: 10px; display:flex; align-items:center; padding: 0 14px; font-family: var(--cc-font-mono); font-size: 12px; font-weight: 700; }
  .tag { font-family: var(--cc-font-mono); font-size: 11px; color: var(--cc-fg2); min-width: 90px; text-align:right; }
</style>
</head>
<body>
<div class="wrap">
  <div class="stop"><div class="tag">green-100</div><div class="bar" style="background:#D5E8D4;color:#2D5A27">#D5E8D4</div></div>
  <div class="stop"><div class="tag">green-200</div><div class="bar" style="background:#90EE90;color:#2D5A27">#90EE90</div></div>
  <div class="stop"><div class="tag">green-300</div><div class="bar" style="background:#88C9A1;color:#2D5A27">#88C9A1</div></div>
  <div class="stop"><div class="tag">green-500</div><div class="bar" style="background:#4CAF50;color:#FFFFFF">#4CAF50</div></div>
  <div class="stop"><div class="tag">green-700</div><div class="bar" style="background:#6B8E23;color:#FFFFFF">#6B8E23</div></div>
  <div class="stop"><div class="tag">green-900</div><div class="bar" style="background:#2D5A27;color:#F3EFE0">#2D5A27</div></div>
</div>
</body>
</html>
