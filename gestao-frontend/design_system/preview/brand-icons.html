<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background:#F8F7F4; font-family: var(--cc-font-sans); color:#1A1A1A; }
  body { padding: 20px; display:flex; align-items:center; justify-content:center; min-height:100vh; box-sizing:border-box; }
  .wrap { width:100%; max-width: 720px; display:grid; grid-template-columns: repeat(6, 1fr); gap: 12px; text-align:center; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:6px; padding: 10px 4px; border: 1px dashed #E7E5E4; border-radius: 10px; color:#1A1A1A; background:#fff; }
  .ico { width: 28px; height: 28px; stroke: #2D5A27; stroke-width: 1.8; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .name { font-size: 10px; font-weight: 600; color: #4D4D4D; }
</style>
</head>
<body>
<div class="wrap">
  <!-- Nav primário -->
  <div class="cell"><svg class="ico" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><div class="name">painel</div></div>
  <div class="cell"><svg class="ico" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><div class="name">perfil</div></div>
  <div class="cell"><svg class="ico" viewBox="0 0 24 24"><path d="M3 21V9l9-6 9 6v12"/><path d="M9 21v-8h6v8"/></svg><div class="name">espaço</div></div>
  <div class="cell"><svg class="ico" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><div class="name">reserva</div></div>

  <!-- Nova: urna de votação para Enquete -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <rect x="3" y="9" width="18" height="12" rx="1.5"/>
      <path d="M8 9V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v3"/>
      <rect x="10" y="11.5" width="4" height="1.2" rx="0.3"/>
      <path d="M14 2.5l-2 3 2 1 1.5-2.5z"/>
    </svg>
    <div class="name">enquete</div>
  </div>

  <div class="cell"><svg class="ico" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><div class="name">comentar</div></div>

  <!-- Wiki: livro aberto com um 'w' de marca -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <path d="M3 5.5A1.5 1.5 0 0 1 4.5 4H10a2 2 0 0 1 2 2v14a1.5 1.5 0 0 0-1.5-1.5H3z"/>
      <path d="M21 5.5A1.5 1.5 0 0 0 19.5 4H14a2 2 0 0 0-2 2v14a1.5 1.5 0 0 1 1.5-1.5H21z"/>
      <path d="M5.5 9l1 4 1.2-3 1.2 3 1-4" stroke-width="1.3"/>
    </svg>
    <div class="name">wiki</div>
  </div>

  <!-- Chamado: chave inglesa -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94z"/>
    </svg>
    <div class="name">chamado</div>
  </div>

  <!-- Acervo: caixa -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <path d="M21 8l-9-5-9 5v8l9 5 9-5z"/>
      <path d="M3 8l9 5 9-5M12 13v10"/>
    </svg>
    <div class="name">acervo</div>
  </div>

  <!-- Mutirão: 3 pessoas juntas -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <circle cx="9" cy="8" r="3"/>
      <circle cx="17" cy="9" r="2.2"/>
      <path d="M3 20v-1a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v1"/>
      <path d="M15 20v-1a3.5 3.5 0 0 1 3.5-3.5h.5A2.5 2.5 0 0 1 21.5 18v2"/>
    </svg>
    <div class="name">mutirão</div>
  </div>

  <!-- Horta / jardim -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <path d="M12 22v-8"/>
      <path d="M12 14c-3 0-5-2-5-5 0-2 1-3 2-3 2 0 3 2 3 5 0 0 0-5 3-5 1 0 2 1 2 3 0 3-2 5-5 5z"/>
      <path d="M4 22h16"/>
      <path d="M5 22l1-3h12l1 3"/>
    </svg>
    <div class="name">horta</div>
  </div>

  <!-- Compostagem -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <path d="M21 12a9 9 0 1 1-3-6.7"/>
      <path d="M21 4v4h-4"/>
      <path d="M9 12a3 3 0 0 0 6 0"/>
    </svg>
    <div class="name">ciclo</div>
  </div>

  <!-- Água / cisterna -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <path d="M12 3c-3 4-6 8-6 11a6 6 0 0 0 12 0c0-3-3-7-6-11z"/>
      <path d="M10 15c0 1.5 1 2.5 2.5 2.5" stroke-width="1.3"/>
    </svg>
    <div class="name">água</div>
  </div>

  <!-- Energia solar -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
    </svg>
    <div class="name">energia</div>
  </div>

  <!-- Calendário lunar -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <path d="M20 14A8 8 0 1 1 10 4a6 6 0 0 0 10 10z"/>
    </svg>
    <div class="name">lua</div>
  </div>

  <!-- Cotista / cota -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 3v9l7 3" />
    </svg>
    <div class="name">cota</div>
  </div>

  <!-- Alerta -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <div class="name">alerta</div>
  </div>

  <!-- Config -->
  <div class="cell">
    <svg class="ico" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    <div class="name">config</div>
  </div>
</div>
</body>
</html>
