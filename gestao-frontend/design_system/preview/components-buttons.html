<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background:#F8F7F4; font-family: var(--cc-font-sans); }
  body { padding: 20px; display:flex; align-items:center; justify-content:center; min-height:100vh; box-sizing:border-box; }
  .wrap { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 660px; }
  button { font-family: inherit; border: none; cursor: pointer; font-weight: 700; font-size: 14px; padding: 10px 18px; border-radius: 9999px; display:inline-flex; align-items:center; gap:8px; justify-content:center; }
  .primary { background: #1F6B3A; color: white; }
  .primary:hover { background: #154B28; }
  .promo { background: #88C9A1; color: #2D5A27; }
  .outline { background: transparent; color: #2D5A27; border: 1.5px solid #88C9A1; }
  .ghost { background: transparent; color: #4D4D4D; font-weight:500; }
  .danger { background: #FEE2E2; color: #991B1B; }
  .sm { font-size: 12px; padding: 6px 14px; }
  .ico { width:14px; height:14px; stroke:currentColor; stroke-width:2; fill:none; }
</style>
</head>
<body>
<div class="wrap">
  <button class="primary"><svg class="ico" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>Novo Perfil</button>
  <button class="promo">Salvar</button>
  <button class="outline">Cancelar</button>
  <button class="ghost">Ver todos</button>
  <button class="primary sm">Criar Enquete</button>
  <button class="danger sm">Remover</button>
</div>
</body>
</html>
