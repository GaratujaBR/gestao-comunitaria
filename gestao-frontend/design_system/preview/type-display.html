<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background:#F8F7F4; font-family: var(--cc-font-sans); }
  body { padding: 24px; display:flex; align-items:center; justify-content:center; min-height:100vh; box-sizing:border-box; }
  .wrap { width: 100%; max-width: 660px; display:flex; flex-direction:column; gap: 12px; color: var(--cc-fg1); }
  .h1 { font-size: 32px; font-weight: 700; line-height: 1.2; letter-spacing: -0.01em; }
  .h2 { font-size: 24px; font-weight: 700; line-height: 1.2; }
  .h3 { font-size: 20px; font-weight: 600; line-height: 1.3; }
  .lbl { font-family: var(--cc-font-mono); font-size: 11px; color: var(--cc-fg2); margin-top: -6px; }
  .eye { font-size: 10px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; color: #88C9A1; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="eye">Vilarejo Ecológico</div>
    <div class="lbl" style="color:#88C9A1;margin-top:2px">10px · weight 800 · tracking 0.2em · upper</div>
  </div>
  <div>
    <div class="h1">Terra de Canaã</div>
    <div class="lbl">h1 — Nunito 32/1.2 · weight 700 · title page</div>
  </div>
  <div>
    <div class="h2">Últimas reservas</div>
    <div class="lbl">h2 — 24/1.2 · weight 700 · section inside page</div>
  </div>
  <div>
    <div class="h3">Casa da Lua Cheia</div>
    <div class="lbl">h3 — 20/1.3 · weight 600 · card title</div>
  </div>
</div>
</body>
</html>
