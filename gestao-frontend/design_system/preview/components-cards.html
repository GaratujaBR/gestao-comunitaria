<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background:#F8F7F4; font-family: var(--cc-font-sans); color: #1A1A1A; }
  body { padding: 20px; display:flex; align-items:center; justify-content:center; min-height:100vh; box-sizing:border-box; }
  .wrap { width:100%; max-width: 660px; display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background:#fff; border: 1px solid #E7E5E4; border-radius: 16px; padding: 18px; box-shadow: 0 2px 8px rgba(45,90,39,0.08); }
  .title { font-size: 16px; font-weight: 700; color:#1A1A1A; margin: 0 0 2px 0; }
  .slug { font-size: 12px; color: #8A8A8A; }
  .meta-row { display:flex; gap: 6px; margin-top: 10px; }
  .pill { display:inline-flex; align-items:center; gap:6px; padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 700; }
  .meta { font-size: 12px; color:#4D4D4D; margin-top: 8px; }
  .promo { background:#F3EFE0; border: 2px solid #6B8E23; border-radius: 20px; padding: 18px; color:#2D5A27; }
  .promo .title { color:#2D5A27; letter-spacing: .04em; text-transform: uppercase; font-weight: 800; font-size: 14px; text-align:center; }
  .promo .body { margin-top: 10px; font-size: 13px; font-weight: 500; color:#2D5A27; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">Casa da Lua Cheia</div>
    <div class="slug">casa.lua.cheia</div>
    <div class="meta-row">
      <span class="pill" style="background:#D5E8D4;color:#2D5A27">ativo</span>
      <span class="pill" style="background:#DBEAFE;color:#1E40AF">Casa Coletiva</span>
    </div>
    <div class="meta">Capacidade total: 8 pessoas · 120 m²</div>
  </div>
  <div class="promo">
    <div class="title">Resource Booking</div>
    <div class="body">Sala comum · Quarto de hóspedes · Carro compartilhado — tudo em um só lugar.</div>
  </div>
</div>
</body>
</html>
